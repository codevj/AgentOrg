  <rect x="68" y="118" width="56" height="14" rx="3" fill="#052e16" stroke="#10b981" stroke-width="0.8"/>
  <text x="96" y="128" text-anchor="middle" fill="#34d399" font-size="7" font-weight="600">INCLUDED</text>

