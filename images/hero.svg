<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="s1">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="800" height="340" rx="14" fill="url(#heroBg)"/>

  <!-- Left: YOUR TASK -->
  <rect x="30" y="110" width="140" height="120" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.5" filter="url(#s1)"/>
  <text x="100" y="148" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Your Task</text>
  <line x1="55" y1="162" x2="145" y2="162" stroke="#334155" stroke-width="1"/>
  <text x="100" y="182" text-anchor="middle" fill="#94a3b8" font-size="10">"Redesign the</text>
  <text x="100" y="196" text-anchor="middle" fill="#94a3b8" font-size="10">onboarding flow"</text>
  <text x="100" y="218" text-anchor="middle" fill="#64748b" font-size="9">any objective</text>

  <!-- Arrow: task to team -->
  <line x1="170" y1="170" x2="210" y2="170" stroke="#475569" stroke-width="2"/>
  <polygon points="206,164 218,170 206,176" fill="#475569"/>

  <!-- Center: YOUR TEAM -->
  <rect x="218" y="45" width="370" height="250" rx="12" fill="#111827" stroke="#3b82f6" stroke-width="1.5" filter="url(#s1)"/>
  <text x="403" y="36" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="700" letter-spacing="1.5">YOUR TEAM</text>

  <!-- Role circles in a flow -->
  <!-- Role A -->
  <circle cx="280" cy="120" r="30" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="280" y="116" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Role A</text>
  <text x="280" y="130" text-anchor="middle" fill="#92400e" font-size="8">scope</text>

  <!-- Arrow A to B -->
  <line x1="310" y1="120" x2="340" y2="120" stroke="#334155" stroke-width="1.5"/>
  <polygon points="337,115 346,120 337,125" fill="#334155"/>

  <!-- Small handoff dot -->
  <circle cx="346" cy="120" r="4" fill="#6366f1"/>

  <!-- Role B -->
  <circle cx="403" cy="120" r="30" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="403" y="116" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">Role B</text>
  <text x="403" y="130" text-anchor="middle" fill="#1e3a5f" font-size="8">design</text>

  <!-- Arrow B to C -->
  <line x1="433" y1="120" x2="463" y2="120" stroke="#334155" stroke-width="1.5"/>
  <polygon points="460,115 469,120 460,125" fill="#334155"/>

  <circle cx="469" cy="120" r="4" fill="#6366f1"/>

  <!-- Role C -->
  <circle cx="526" cy="120" r="30" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="526" y="116" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Role C</text>
  <text x="526" y="130" text-anchor="middle" fill="#064e3b" font-size="8">execute</text>

  <!-- Arrow C down to D -->
  <line x1="526" y1="150" x2="526" y2="180" stroke="#334155" stroke-width="1.5"/>
  <polygon points="521,177 526,186 531,177" fill="#334155"/>

  <circle cx="526" cy="186" r="4" fill="#6366f1"/>

  <!-- Role D -->
  <circle cx="526" cy="220" r="30" fill="#1e293b" stroke="#f97316" stroke-width="2"/>
  <text x="526" y="216" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="600">Role D</text>
  <text x="526" y="230" text-anchor="middle" fill="#7c2d12" font-size="8">check</text>

  <!-- Arrow D to E -->
  <line x1="496" y1="220" x2="466" y2="220" stroke="#334155" stroke-width="1.5"/>
  <polygon points="469,225 460,220 469,215" fill="#334155"/>

  <circle cx="460" cy="220" r="4" fill="#6366f1"/>

  <!-- Role E -->
  <circle cx="403" cy="220" r="30" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
  <text x="403" y="216" text-anchor="middle" fill="#f472b6" font-size="10" font-weight="600">Role E</text>
  <text x="403" y="230" text-anchor="middle" fill="#831843" font-size="8">review</text>

  <!-- Quality gate indicator -->
  <rect x="258" y="192" width="90" height="22" rx="4" fill="#1c1917" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="303" y="207" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">quality gate</text>
  <!-- Loop arrow hint -->
  <path d="M 373 220 C 340 220, 310 220, 310 190 C 310 160, 310 140, 310 120" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- Handoff label -->
  <circle cx="310" cy="170" r="4" fill="#6366f1"/>
  <text x="310" y="170" text-anchor="middle" fill="#a78bfa" font-size="7" dy="-8">handoff</text>

  <!-- Arrow: team to output -->
  <line x1="588" y1="170" x2="618" y2="170" stroke="#475569" stroke-width="2"/>
  <polygon points="614,164 626,170 614,176" fill="#475569"/>

  <!-- Right: STRUCTURED OUTPUT -->
  <rect x="628" y="95" width="148" height="150" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5" filter="url(#s1)"/>
  <text x="702" y="125" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">Structured</text>
  <text x="702" y="140" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">Output</text>
  <line x1="648" y1="150" x2="756" y2="150" stroke="#334155" stroke-width="1"/>
  <text x="654" y="168" fill="#94a3b8" font-size="9">scoped</text>
  <text x="654" y="183" fill="#94a3b8" font-size="9">designed</text>
  <text x="654" y="198" fill="#94a3b8" font-size="9">executed</text>
  <text x="654" y="213" fill="#94a3b8" font-size="9">validated</text>
  <text x="654" y="228" fill="#94a3b8" font-size="9">reviewed</text>

  <!-- check marks -->
  <text x="740" y="168" text-anchor="end" fill="#22c55e" font-size="9">&#10003;</text>
  <text x="740" y="183" text-anchor="end" fill="#22c55e" font-size="9">&#10003;</text>
  <text x="740" y="198" text-anchor="end" fill="#22c55e" font-size="9">&#10003;</text>
  <text x="740" y="213" text-anchor="end" fill="#22c55e" font-size="9">&#10003;</text>
  <text x="740" y="228" text-anchor="end" fill="#22c55e" font-size="9">&#10003;</text>

  <!-- Bottom tagline -->
  <text x="400" y="322" text-anchor="middle" fill="#94a3b8" font-size="12">You define the roles. You define the team. The agent runs through them all.</text>
</svg>
