team_id: product-delivery
mode_default: team
roles:
  - id: program-manager
  - id: architect
    depends_on: [program-manager]
  - id: developer
    depends_on: [architect]
  - id: tester
    depends_on: [developer]
  - id: code-reviewer
    depends_on: [developer]
gates:
  reviewer_required: true
  tester_required: true
budget:
  max_calls: 12
  reflection: true
  interactions: 3
